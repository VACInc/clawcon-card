<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1020">
  <title>VAC · ClawCon</title>
  <meta name="description" content="Connect with VAC at ClawCon.">
  <style>
    :root{--bg:#070a12;--card:#111827cc;--text:#f8fafc;--muted:#a5b4fc;--line:#334155;--accent:#7c3aed;--accent2:#06b6d4}
    *{box-sizing:border-box} body{margin:0;min-height:100svh;display:grid;place-items:center;padding:24px;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,#1e1b4b 0,#070a12 38%,#020617 100%)}
    .wrap{width:min(520px,100%)} .card{border:1px solid #334155aa;background:linear-gradient(180deg,#111827dd,#020617dd);box-shadow:0 24px 90px #0008;border-radius:28px;padding:28px;backdrop-filter:blur(14px)}
    .badge{display:inline-flex;gap:8px;align-items:center;border:1px solid #475569;background:#0f172a;border-radius:999px;padding:8px 12px;color:#c4b5fd;font-size:14px}
    h1{font-size:42px;line-height:1;margin:24px 0 10px;letter-spacing:-.04em} p{color:#cbd5e1;line-height:1.5;margin:0 0 24px}.links{display:grid;gap:12px}
    a.link{display:flex;justify-content:space-between;align-items:center;text-decoration:none;color:var(--text);border:1px solid var(--line);background:#0f172a;border-radius:18px;padding:16px 18px;font-weight:750;transition:.15s transform,.15s border-color,.15s background}
    a.link:hover{transform:translateY(-2px);border-color:#818cf8;background:#111c34}.hint{margin-top:18px;font-size:13px;color:#94a3b8}.arrow{color:#67e8f9}.disabled{opacity:.72}.disabled .arrow{color:#fbbf24}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="badge">⚡ ClawCon networking card</div>
      <h1>VAC</h1>
      <p>Builder, operator, automation gremlin. If we talked at ClawCon, here’s the fast path to find me again.</p>
      <nav class="links" aria-label="Social links">
        <a class="link disabled" href="https://www.linkedin.com/" rel="me noopener" target="_blank"><span>LinkedIn</span><span class="arrow">send URL →</span></a>
        <a class="link" href="https://x.com/HixVAC" rel="me noopener" target="_blank"><span>X / Twitter</span><span class="arrow">@HixVAC →</span></a>
        <a class="link" href="https://github.com/VACInc" rel="me noopener" target="_blank"><span>GitHub</span><span class="arrow">VACInc →</span></a>
      </nav>
      <div class="hint">Built for quick hallway follow-ups. No app. No tracking. No nonsense.</div>
    </section>
  </main>
</body>
</html>
